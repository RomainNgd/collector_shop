sonar.projectKey=RomainNgd_collector_shop
sonar.projectName=collector-shop
sonar.organization=romainngd
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

sonar.sources=go-api,collector-spa/src
sonar.tests=go-api

sonar.test.inclusions=go-api/**/*_test.go
sonar.exclusions=collector-spa/build/**,collector-spa/.svelte-kit/**,collector-spa/node_modules/**,go-api/upload/**,go-api/database/fixtures/images/**,go-api/coverage,go-api/coverage.out,go-api/services/services,**/coverage/**,**/*.d.ts

sonar.go.coverage.reportPaths=go-api/coverage.out

# In test tables, repeated fixtures improve readability and branching verifies
# independent cases. Keep these two maintainability rules focused on production.
sonar.issue.ignore.multicriteria=testLiteralDuplication,testCognitiveComplexity
sonar.issue.ignore.multicriteria.testLiteralDuplication.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.testLiteralDuplication.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.testCognitiveComplexity.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.testCognitiveComplexity.resourceKey=**/*_test.go
