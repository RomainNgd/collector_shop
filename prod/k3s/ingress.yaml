apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collector-shop
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: collector-app.romainnigond.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collector-spa
                port:
                  number: 3000
    - host: collector-api.romainnigond.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-api
                port:
                  number: 8080
