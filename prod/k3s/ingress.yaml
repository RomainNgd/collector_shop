apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collector-shop
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: collector.local
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: go-api
                port:
                  number: 8080
          - path: /products
            pathType: Prefix
            backend:
              service:
                name: go-api
                port:
                  number: 8080
          - path: /categories
            pathType: Prefix
            backend:
              service:
                name: go-api
                port:
                  number: 8080
          - path: /upload
            pathType: Prefix
            backend:
              service:
                name: go-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collector-spa
                port:
                  number: 3000
