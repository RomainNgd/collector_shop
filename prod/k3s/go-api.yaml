apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: go-api-uploads
  namespace: collector-shop-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
  namespace: collector-shop-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      imagePullSecrets:
        - name: dockerhub-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: go-api
          image: romain2311/go-api:2343644
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: API_PORT
            - name: GIN_MODE
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: GIN_MODE
            - name: METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: API_METRICS_PORT
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: DB_NAME
            - name: DB_AUTO_MIGRATE
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: DB_AUTO_MIGRATE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: JWT_SECRET
            - name: UPLOAD_DIR
              value: /app/upload
            - name: MAX_FILE_SIZE
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: MAX_FILE_SIZE
            - name: STRIPE_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: STRIPE_ENABLED
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: STRIPE_CHECKOUT_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: STRIPE_CHECKOUT_ALLOWED_ORIGINS
          volumeMounts:
            - name: go-api-uploads
              mountPath: /app/upload
            - name: tmp
              mountPath: /tmp
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: go-api-uploads
          persistentVolumeClaim:
            claimName: go-api-uploads
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: go-api
  namespace: collector-shop-prod
spec:
  selector:
    app: go-api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: go-api-metrics
  namespace: collector-shop-prod
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: /metrics
spec:
  selector:
    app: go-api
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
      protocol: TCP
