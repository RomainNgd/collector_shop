apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: go-api-uploads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      containers:
        - name: go-api
          image: collector-shop/go-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: API_PORT
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: DB_NAME
            - name: DB_AUTO_MIGRATE
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: DB_AUTO_MIGRATE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: JWT_SECRET
            - name: UPLOAD_DIR
              value: /app/upload
            - name: MAX_FILE_SIZE
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: MAX_FILE_SIZE
          volumeMounts:
            - name: go-api-uploads
              mountPath: /app/upload
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: go-api-uploads
          persistentVolumeClaim:
            claimName: go-api-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: go-api
spec:
  selector:
    app: go-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
