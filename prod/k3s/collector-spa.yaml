apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector-spa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector-spa
  template:
    metadata:
      labels:
        app: collector-spa
    spec:
      containers:
        - name: collector-spa
          image: collector-shop/collector-spa:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: SPA_PORT
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: API_BASE_URL
            - name: API_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: API_PUBLIC_BASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: collector-spa
spec:
  selector:
    app: collector-spa
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
