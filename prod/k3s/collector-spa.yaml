apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector-spa
  namespace: collector-shop-prod
spec:
  selector:
    matchLabels:
      app: collector-spa
  template:
    metadata:
      labels:
        app: collector-spa
    spec:
      imagePullSecrets:
        - name: dockerhub-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: collector-spa
          image: romain2311/collector-spa:7ce6198
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: SPA_PORT
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: API_BASE_URL
            - name: API_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: collector-shop-config
                  key: API_PUBLIC_BASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: collector-shop-secrets
                  key: JWT_SECRET
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          # La liveness doit detecter un process bloque, pas un process
          # surcharge: timeout et failureThreshold larges pour survivre
          # a un pic de charge sans que le kubelet tue le conteneur.
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: collector-spa
  namespace: collector-shop-prod
spec:
  selector:
    app: collector-spa
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
