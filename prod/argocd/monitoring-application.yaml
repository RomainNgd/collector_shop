apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 29.14.0
    helm:
      valuesObject:
        alertmanager:
          enabled: false
        kube-state-metrics:
          enabled: false
        prometheus-pushgateway:
          enabled: false
        server:
          retention: 7d
          retentionSize: 4GB
          persistentVolume:
            enabled: true
            size: 5Gi
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
          scrapeConfigs:
            kubernetes-api-servers: {enabled: false}
            kubernetes-nodes: {enabled: false}
            kubernetes-nodes-cadvisor: {enabled: false}
            kubernetes-pods: {enabled: false}
            kubernetes-pods-slow: {enabled: false}
            kubernetes-services: {enabled: false}
            kubernetes-service-endpoints-slow: {enabled: false}
        prometheus-node-exporter:
          resources:
            requests: {cpu: 20m, memory: 32Mi}
            limits: {cpu: 100m, memory: 128Mi}
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.14
    helm:
      valuesObject:
        persistence:
          enabled: true
          size: 1Gi
        initChownData:
          enabled: false
        resources:
          requests: {cpu: 50m, memory: 128Mi}
          limits: {cpu: 300m, memory: 512Mi}
        ingress:
          enabled: true
          ingressClassName: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          hosts:
            - grafana.romainnigond.fr
          path: /
          pathType: Prefix
          tls:
            - secretName: grafana-tls
              hosts:
                - grafana.romainnigond.fr
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                uid: prometheus
                url: http://prometheus-server.monitoring.svc.cluster.local
                access: proxy
                isDefault: true
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: monitoring
                orgId: 1
                folder: Monitoring
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/monitoring
        dashboards:
          monitoring:
            node-exporter:
              gnetId: 1860
              revision: 37
              datasource: Prometheus
            go-runtime:
              gnetId: 14061
              revision: 1
              datasource: Prometheus
            collector-shop:
              json: |
                {
                  "title": "Collector Shop - Vue rapide",
                  "uid": "collector-shop-overview",
                  "schemaVersion": 39,
                  "refresh": "30s",
                  "time": {"from": "now-6h", "to": "now"},
                  "tags": ["collector-shop", "automatique"],
                  "panels": [
                    {"id": 1, "type": "stat", "title": "API - requêtes/s", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(rate(collector_http_requests_total[5m]))", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}}},
                    {"id": 2, "type": "stat", "title": "API - erreurs 5xx", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "100 * (sum(rate(collector_http_requests_total{status=~\"5..\"}[5m])) or vector(0)) / clamp_min(sum(rate(collector_http_requests_total[5m])), 0.001)", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}}},
                    {"id": 3, "type": "stat", "title": "API - latence p95", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "histogram_quantile(0.95, sum by (le) (rate(collector_http_request_duration_seconds_bucket[5m])))", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}}},
                    {"id": 4, "type": "stat", "title": "Serveur - CPU utilisé", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "100 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}}},
                    {"id": 5, "type": "stat", "title": "Serveur - RAM utilisée", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}}},
                    {"id": 6, "type": "stat", "title": "Serveur - disque utilisé", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "100 * (1 - node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"})", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}, "overrides": []}, "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}}}
                  ]
                }
        grafana.ini:
          server:
            domain: grafana.romainnigond.fr
            root_url: https://grafana.romainnigond.fr
            enforce_domain: true
          security:
            cookie_secure: true
            cookie_samesite: strict
            strict_transport_security: true
            strict_transport_security_max_age_seconds: 31536000
          users:
            allow_sign_up: false
          auth.anonymous:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
