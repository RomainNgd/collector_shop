apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 29.14.0
    helm:
      valuesObject:
        alertmanager:
          enabled: false
        kube-state-metrics:
          enabled: false
        prometheus-pushgateway:
          enabled: false
        server:
          retention: 7d
          retentionSize: 4GB
          persistentVolume:
            enabled: true
            size: 5Gi
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
          scrapeConfigs:
            kubernetes-api-servers: {enabled: false}
            kubernetes-nodes: {enabled: false}
            kubernetes-nodes-cadvisor: {enabled: false}
            kubernetes-pods: {enabled: false}
            kubernetes-pods-slow: {enabled: false}
            kubernetes-services: {enabled: false}
            kubernetes-service-endpoints-slow: {enabled: false}
        prometheus-node-exporter:
          resources:
            requests: {cpu: 20m, memory: 32Mi}
            limits: {cpu: 100m, memory: 128Mi}
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.14
    helm:
      valuesObject:
        persistence:
          enabled: true
          size: 1Gi
        resources:
          requests: {cpu: 50m, memory: 128Mi}
          limits: {cpu: 300m, memory: 512Mi}
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                uid: prometheus
                url: http://prometheus-server.monitoring.svc.cluster.local
                access: proxy
                isDefault: true
        grafana.ini:
          users:
            allow_sign_up: false
          auth.anonymous:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
