services:
  db:
    image: postgres:16
    container_name: collector-db
    environment:
      POSTGRES_DB: ${DB_NAME:-ecommerce}
      POSTGRES_USER: ${DB_USER:-golang}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-golang}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-golang} -d ${DB_NAME:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  go-api:
    image: ${GO_API_IMAGE:-collector-shop/go-api:local}
    container_name: collector-go-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${API_PORT:-8080}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-golang}
      DB_PASSWORD: ${DB_PASSWORD:-golang}
      DB_NAME: ${DB_NAME:-ecommerce}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-real-env}
      UPLOAD_DIR: /app/upload
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
    volumes:
      - api_uploads:/app/upload
    ports:
      - "${API_EXTERNAL_PORT:-8080}:8080"
    restart: unless-stopped

  collector-spa:
    image: ${SPA_IMAGE:-collector-shop/collector-spa:local}
    container_name: collector-spa
    depends_on:
      - go-api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      API_BASE_URL: ${API_BASE_URL:-http://go-api:8080}
    ports:
      - "${SPA_EXTERNAL_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  api_uploads:
