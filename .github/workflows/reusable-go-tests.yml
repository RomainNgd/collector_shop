name: Reusable Go Tests

on:
  workflow_call:

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: golang
          POSTGRES_PASSWORD: golang
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U golang -d ecommerce"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_USER: golang
      DB_PASSWORD: golang
      DB_NAME: ecommerce

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-api/go.mod
          cache-dependency-path: go-api/go.sum

      - name: Run Go tests
        run: bash go-api/scripts/ci-test.sh

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: go-api/coverage.out
