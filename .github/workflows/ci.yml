name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: "1.25.5"
  NODE_VERSION: "22"
  IMAGE_NAMESPACE: collector-shop
  IMAGE_REGISTRY: docker.io

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-api/go.mod
          cache-dependency-path: go-api/go.sum

      - name: Run Go tests
        run: bash go-api/scripts/ci-test.sh

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: go-api/coverage.out

  svelte-tests:
    name: Svelte Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: collector-spa/package-lock.json

      - name: Run frontend checks
        run: bash collector-spa/scripts/ci-test.sh

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs:
      - go-tests
      - svelte-tests
    if: ${{ secrets.SONAR_TOKEN != '' && vars.SONAR_ORGANIZATION != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Go coverage
        uses: actions/download-artifact@v4
        with:
          name: go-coverage
          path: go-api

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io

  build-and-scan:
    name: Build And Security Scan
    runs-on: ubuntu-latest
    needs:
      - go-tests
      - svelte-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tag
        shell: bash
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY_OWNER}" >> "$GITHUB_ENV"

      - name: Build Docker images
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
        run: bash build/scripts/ci-build-images.sh

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Scan repository
        run: bash build/scripts/ci-security-scan.sh

      - name: Scan built images
        env:
          SCAN_MODE: images
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
        run: bash build/scripts/ci-security-scan.sh

  push-images:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - build-and-scan
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish go-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/go-api.Dockerfile
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/go-api:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/go-api:latest

      - name: Publish collector-spa image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/collector-spa.Dockerfile
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/collector-spa:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/collector-spa:latest
