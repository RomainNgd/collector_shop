name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  go-tests:
    name: Go Tests
    uses: ./.github/workflows/reusable-go-tests.yml

  svelte-checks:
    name: Svelte Checks
    uses: ./.github/workflows/reusable-svelte-checks.yml

  lint:
    name: Lint
    uses: ./.github/workflows/reusable-lint.yml

  sonarcloud:
    name: SonarCloud
    needs:
      - go-tests
      - svelte-checks
    uses: ./.github/workflows/reusable-sonarcloud.yml
    with:
      sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}

  build-and-scan:
    name: Build And Security Scan
    needs:
      - go-tests
      - svelte-checks
      - lint
    uses: ./.github/workflows/reusable-build-and-scan.yml

  push-images:
    name: Push Docker Images
    needs:
      - build-and-scan
      - sonarcloud
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
    uses: ./.github/workflows/reusable-push-images.yml
    secrets:
      dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
