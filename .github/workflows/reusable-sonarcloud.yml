name: Reusable SonarCloud

on:
  workflow_call:
    inputs:
      sonar_organization:
        description: SonarCloud organization key
        required: false
        type: string
    secrets:
      sonar_token:
        required: false

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.sonar_token }}
      SONAR_ORGANIZATION: ${{ inputs.sonar_organization }}

    steps:
      - name: Checkout repository
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Go coverage
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        uses: actions/download-artifact@v4
        with:
          name: go-coverage
          path: go-api

      - name: Skip SonarCloud when not configured
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_ORGANIZATION == '' }}
        run: echo "Skipping SonarCloud scan because SONAR_TOKEN or SONAR_ORGANIZATION is not configured."

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
