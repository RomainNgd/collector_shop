name: Reusable SonarCloud

on:
  workflow_call:
    secrets:
      sonar_token:
        required: true

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.sonar_token }}

    steps:
      - name: Validate SonarCloud token
        shell: bash
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is not configured in the repository Actions secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Go coverage
        uses: actions/download-artifact@v4
        with:
          name: go-coverage
          path: go-api

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: collector-spa/coverage

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: collector-spa/package-lock.json

      - name: Prepare SvelteKit TypeScript configuration
        working-directory: collector-spa
        run: |
          npm ci --ignore-scripts
          npm exec svelte-kit sync

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
