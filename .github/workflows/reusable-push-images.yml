name: Reusable Push Images

on:
  workflow_call:
    secrets:
      dockerhub_username:
        required: false
      dockerhub_token:
        required: false

jobs:
  push-images:
    name: Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.dockerhub_username }}
      DOCKERHUB_TOKEN: ${{ secrets.dockerhub_token }}

    steps:
      - name: Checkout repository
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Skip Docker push when not configured
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: echo "Skipping Docker Hub push because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-buildx-action@v4

      - name: Derive image tag
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Publish go-api image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/go-api.Dockerfile
          push: true
          cache-from: type=gha,scope=go-api
          cache-to: type=gha,mode=max,scope=go-api
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/go-api:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/go-api:latest

      - name: Publish collector-spa image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/collector-spa.Dockerfile
          push: true
          cache-from: type=gha,scope=collector-spa
          cache-to: type=gha,mode=max,scope=collector-spa
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/collector-spa:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/collector-spa:latest

      - name: Bump image tags in k3s manifests
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: |
          sed -i -E "s#(image: [^:[:space:]]+/go-api):[A-Za-z0-9_.-]+#\1:${IMAGE_TAG}#" prod/k3s/go-api.yaml
          sed -i -E "s#(image: [^:[:space:]]+/collector-spa):[A-Za-z0-9_.-]+#\1:${IMAGE_TAG}#" prod/k3s/collector-spa.yaml

      - name: Commit and push manifest update
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prod/k3s/go-api.yaml prod/k3s/collector-spa.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore(deploy): bump image tags to ${IMAGE_TAG} [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
