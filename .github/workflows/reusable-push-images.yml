name: Reusable Push Images

on:
  workflow_call:
    secrets:
      dockerhub_username:
        required: false
      dockerhub_token:
        required: false

jobs:
  push-images:
    name: Push Docker Images
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.dockerhub_username }}
      DOCKERHUB_TOKEN: ${{ secrets.dockerhub_token }}

    steps:
      - name: Checkout repository
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Skip Docker push when not configured
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: echo "Skipping Docker Hub push because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Publish go-api image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/go-api.Dockerfile
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/go-api:${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/go-api:latest

      - name: Publish collector-spa image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/collector-spa.Dockerfile
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/collector-spa:${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/collector-spa:latest
